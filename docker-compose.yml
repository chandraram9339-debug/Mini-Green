# DEV / LOCAL STACK ONLY — do not expose this Postgres/Redis compose file on production VPS as-is.
# Production uses SQLite + pm2 (see deploy/PRODUCTION_SERVER_SETUP.md). Default credentials below are not secrets for prod.

services:
  postgres:
    image: postgres:16-alpine
    container_name: miniapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: miniapp
      POSTGRES_PASSWORD: miniapp
      POSTGRES_DB: miniapp
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: miniapp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  pg_data:
  redis_data:
