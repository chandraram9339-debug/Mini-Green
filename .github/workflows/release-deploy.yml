name: release-deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "RC tag to deploy (example: rc-2026.04.15-01)"
        required: true
        type: string
      target_environment:
        description: "Deployment target environment"
        required: true
        default: "staging-rc"
        type: string
  push:
    tags:
      - "rc-*"

jobs:
  deploy-rc:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.target_environment || 'staging-rc' }}
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
      TARGET_ENV: ${{ github.event.inputs.target_environment || 'staging-rc' }}
    steps:
      - name: Capture deploy start UTC
        run: echo "DEPLOY_START_UTC=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Validate RC tag format
        run: |
          [[ "${RELEASE_TAG}" =~ ^rc-[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[0-9]{2}$ ]] || {
            echo "Invalid release tag: ${RELEASE_TAG}"
            exit 1
          }

      - name: Checkout RC tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Resolve deployed commit
        run: |
          DEPLOYED_COMMIT="$(git rev-parse HEAD)"
          echo "DEPLOYED_COMMIT=${DEPLOYED_COMMIT}" >> "$GITHUB_ENV"
          echo "deployed_tag=${RELEASE_TAG}"
          echo "deployed_commit=${DEPLOYED_COMMIT}"
          echo "target_environment=${TARGET_ENV}"

      - name: Deploy RC to target environment
        run: |
          # Deployment hook point for release pipeline.
          # Current baseline marks deployment with environment-bound workflow run.
          echo "deploy_status=SUCCESS"
          echo "deploy_target=${TARGET_ENV}"
          echo "deploy_tag=${RELEASE_TAG}"

      - name: Capture deploy end UTC and emit evidence
        run: |
          DEPLOY_END_UTC="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > deploy-evidence.txt <<EOF
          release_tag=${RELEASE_TAG}
          deployed_commit=${DEPLOYED_COMMIT}
          target_environment=${TARGET_ENV}
          deploy_start_utc=${DEPLOY_START_UTC}
          deploy_end_utc=${DEPLOY_END_UTC}
          workflow_run_url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          cat deploy-evidence.txt

      - name: Upload deploy evidence
        uses: actions/upload-artifact@v4
        with:
          name: deploy-evidence-${{ env.RELEASE_TAG }}
          path: deploy-evidence.txt
