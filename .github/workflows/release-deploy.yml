name: release-deploy

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "RC tag to deploy (example: rc-2026.04.15-01)"
        required: true
        type: string
      target_environment:
        description: "Deployment target environment"
        required: true
        default: "staging-rc"
        type: string
      visual_fidelity_pass:
        description: "Visual Fidelity PASS confirmed by 06_SECURITY_QA (true/false)"
        required: true
        default: "false"
        type: string
      visual_evidence_ref:
        description: "QA visual evidence ref (run ID / report URL)"
        required: true
        type: string
      qa_owner_tag:
        description: "QA owner tag confirming visual acceptance"
        required: true
        default: "06_SECURITY_QA"
        type: string
      visual_failure_reason:
        description: "If visual_fidelity_pass=false: external_tooling_quota | visual_regression | unknown"
        required: true
        default: "unknown"
        type: string
      external_unblock_ttl_hours:
        description: "TTL window for external tooling blocker before escalation"
        required: true
        default: "24"
        type: string
      escalation_path:
        description: "Escalation chain for external tooling blocker"
        required: true
        default: "06_SECURITY_QA -> 07_REPO_ARCH/Infra -> 00_MASTER"
        type: string
  push:
    tags:
      - "rc-*"

jobs:
  deploy-rc:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.target_environment || 'staging-rc' }}
    permissions:
      contents: read
    env:
      RELEASE_TAG: ${{ github.event.inputs.release_tag || github.ref_name }}
      TARGET_ENV: ${{ github.event.inputs.target_environment || 'staging-rc' }}
      VISUAL_FIDELITY_PASS: ${{ github.event.inputs.visual_fidelity_pass || 'false' }}
      VISUAL_EVIDENCE_REF: ${{ github.event.inputs.visual_evidence_ref || 'missing' }}
      QA_OWNER_TAG: ${{ github.event.inputs.qa_owner_tag || '06_SECURITY_QA' }}
      VISUAL_FAILURE_REASON: ${{ github.event.inputs.visual_failure_reason || 'unknown' }}
      EXTERNAL_UNBLOCK_TTL_HOURS: ${{ github.event.inputs.external_unblock_ttl_hours || '24' }}
      ESCALATION_PATH: ${{ github.event.inputs.escalation_path || '06_SECURITY_QA -> 07_REPO_ARCH/Infra -> 00_MASTER' }}
    steps:
      - name: Capture deploy start UTC
        run: echo "DEPLOY_START_UTC=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Validate RC tag format
        run: |
          [[ "${RELEASE_TAG}" =~ ^rc-[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[0-9]{2}$ ]] || {
            echo "Invalid release tag: ${RELEASE_TAG}"
            exit 1
          }

      - name: Checkout RC tag
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Resolve deployed commit
        run: |
          DEPLOYED_COMMIT="$(git rev-parse HEAD)"
          echo "DEPLOYED_COMMIT=${DEPLOYED_COMMIT}" >> "$GITHUB_ENV"
          echo "deployed_tag=${RELEASE_TAG}"
          echo "deployed_commit=${DEPLOYED_COMMIT}"
          echo "target_environment=${TARGET_ENV}"

      - name: Enforce visual quality gate (06_SECURITY_QA)
        run: |
          if [[ "${VISUAL_FIDELITY_PASS}" != "true" ]]; then
            if [[ "${VISUAL_FAILURE_REASON}" == "external_tooling_quota" ]]; then
              echo "alert_rule=release-operations-guard-v1"
              echo "release_close=BLOCKED_WITH_EXTERNAL_DEPENDENCY"
              echo "reason=Visual acceptance blocked by external tooling quota"
              echo "qa_owner_tag=${QA_OWNER_TAG}"
              echo "visual_evidence_ref=${VISUAL_EVIDENCE_REF}"
              echo "external_unblock_ttl_hours=${EXTERNAL_UNBLOCK_TTL_HOURS}"
              echo "escalation_path=${ESCALATION_PATH}"
              echo "auto_rerun_visual_acceptance=REQUIRED_AFTER_UNBLOCK"
              exit 1
            fi
            echo "alert_rule=release-operations-guard-v1"
            echo "release_close=BLOCKED"
            echo "reason=Visual Fidelity PASS missing from 06_SECURITY_QA"
            echo "qa_owner_tag=${QA_OWNER_TAG}"
            echo "visual_evidence_ref=${VISUAL_EVIDENCE_REF}"
            echo "visual_failure_reason=${VISUAL_FAILURE_REASON}"
            exit 1
          fi
          echo "release_close=UNBLOCKED"
          echo "visual_fidelity_pass=${VISUAL_FIDELITY_PASS}"
          echo "qa_owner_tag=${QA_OWNER_TAG}"
          echo "visual_evidence_ref=${VISUAL_EVIDENCE_REF}"
          echo "auto_rerun_visual_acceptance=NOT_REQUIRED"

      - name: Resolve rollback candidate
        run: |
          PREVIOUS_RC_TAG="$(git tag --list 'rc-*' --sort=-version:refname | grep -Fvx "${RELEASE_TAG}" | head -n 1 || true)"
          if [[ -z "${PREVIOUS_RC_TAG}" ]]; then
            echo "rollback_candidate_tag=UNAVAILABLE"
            echo "rollback_candidate_reason=no_previous_rc_tag"
            echo "ROLLBACK_CANDIDATE_TAG=UNAVAILABLE" >> "$GITHUB_ENV"
          else
            echo "rollback_candidate_tag=${PREVIOUS_RC_TAG}"
            echo "rollback_candidate_reason=previous_rc_tag"
            echo "ROLLBACK_CANDIDATE_TAG=${PREVIOUS_RC_TAG}" >> "$GITHUB_ENV"
          fi

      - name: Deploy RC to target environment
        run: |
          # Deployment hook point for release pipeline.
          # Current baseline marks deployment with environment-bound workflow run.
          echo "alert_rule=release-operations-guard-v1"
          echo "deploy_status=SUCCESS"
          echo "deploy_target=${TARGET_ENV}"
          echo "deploy_tag=${RELEASE_TAG}"

      - name: Capture deploy end UTC and emit evidence
        run: |
          DEPLOY_END_UTC="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > deploy-evidence.txt <<EOF
          release_tag=${RELEASE_TAG}
          deployed_commit=${DEPLOYED_COMMIT}
          target_environment=${TARGET_ENV}
          deploy_start_utc=${DEPLOY_START_UTC}
          deploy_end_utc=${DEPLOY_END_UTC}
          visual_fidelity_pass=${VISUAL_FIDELITY_PASS}
          qa_owner_tag=${QA_OWNER_TAG}
          visual_evidence_ref=${VISUAL_EVIDENCE_REF}
          visual_failure_reason=${VISUAL_FAILURE_REASON}
          external_unblock_ttl_hours=${EXTERNAL_UNBLOCK_TTL_HOURS}
          escalation_path=${ESCALATION_PATH}
          rollback_candidate_tag=${ROLLBACK_CANDIDATE_TAG}
          workflow_run_url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          cat deploy-evidence.txt

      - name: Upload deploy evidence
        uses: actions/upload-artifact@v4
        with:
          name: deploy-evidence-${{ env.RELEASE_TAG }}
          path: deploy-evidence.txt
