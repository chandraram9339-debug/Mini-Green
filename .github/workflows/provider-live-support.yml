name: provider-live-support

on:
  workflow_dispatch:
    inputs:
      target_environment:
        description: "Protected environment providing live provider secrets"
        required: true
        default: "staging-rc"
        type: string
      env_source_path:
        description: "Generated env file path for live provider support check"
        required: true
        default: ".tmp/provider-live.env"
        type: string
      owner_tag:
        description: "Infra owner tag for support verification"
        required: true
        default: "07_REPO_ARCH/Infra"
        type: string

jobs:
  provider-live-support:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.target_environment || 'staging-rc' }}
    permissions:
      contents: read
    env:
      TARGET_ENV: ${{ github.event.inputs.target_environment || 'staging-rc' }}
      ENV_SOURCE_PATH: ${{ github.event.inputs.env_source_path || '.tmp/provider-live.env' }}
      OWNER_TAG: ${{ github.event.inputs.owner_tag || '07_REPO_ARCH/Infra' }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
    steps:
      - name: Capture support check start UTC
        run: echo "SUPPORT_CHECK_START_UTC=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate secret wiring presence
        run: |
          if [[ -z "${TELEGRAM_BOT_TOKEN}" ]]; then
            echo "owner-tag=${OWNER_TAG}"
            echo "failure_hop=provider_config"
            echo "first_failing_substep=provider_secret"
            echo "reason=missing TELEGRAM_BOT_TOKEN environment secret"
            exit 1
          fi

      - name: Generate provider-live env source
        run: |
          mkdir -p "$(dirname "${ENV_SOURCE_PATH}")"
          cp backend/.env.example "${ENV_SOURCE_PATH}"
          sed -i 's/^AUTH_PROVIDER_MODE=.*/AUTH_PROVIDER_MODE=telegram/' "${ENV_SOURCE_PATH}"
          sed -i 's/^ENABLE_OPS_LOGS=.*/ENABLE_OPS_LOGS=true/' "${ENV_SOURCE_PATH}"
          sed -i 's#^ACTION_STORE_PATH=.*#ACTION_STORE_PATH=.tmp/provider-action-store.json#' "${ENV_SOURCE_PATH}"
          sed -i '/^TELEGRAM_BOT_TOKEN=/d' "${ENV_SOURCE_PATH}"
          printf 'TELEGRAM_BOT_TOKEN=%s\n' "${TELEGRAM_BOT_TOKEN}" >> "${ENV_SOURCE_PATH}"

      - name: Run provider support verification
        run: |
          chmod +x scripts/provider-verify-support-check.sh
          ENV_SOURCE="${ENV_SOURCE_PATH}" \
          EXPECTED_ENV_SOURCE="${ENV_SOURCE_PATH}" \
          OWNER_TAG="${OWNER_TAG}" \
          scripts/provider-verify-support-check.sh | tee provider-live-support-report.txt

      - name: Publish provider support summary
        if: always()
        run: |
          {
            echo "## Provider Live Support"
            echo
            echo "- target_environment=${TARGET_ENV}"
            echo "- env_source=${ENV_SOURCE_PATH}"
            echo "- workflow_run_url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- owner_tag=${OWNER_TAG}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload provider support evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: provider-live-support-${{ github.run_id }}
          path: |
            provider-live-support-report.txt
            .tmp/provider-live.env
