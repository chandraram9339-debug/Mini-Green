name: rollback-quick-pass

on:
  workflow_dispatch:
    inputs:
      deployed_tag:
        description: "Currently deployed RC tag"
        required: true
        type: string
      rollback_to_tag:
        description: "RC tag to roll back to"
        required: true
        type: string
      target_environment:
        description: "Environment used for rollback rehearsal"
        required: true
        default: "staging-rc"
        type: string
      rollback_reason:
        description: "Why rollback quick-pass is being executed"
        required: true
        default: "release-readiness"
        type: string

jobs:
  rollback-quick-pass:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.event.inputs.target_environment || 'staging-rc' }}
    permissions:
      contents: read
    env:
      DEPLOYED_TAG: ${{ github.event.inputs.deployed_tag }}
      ROLLBACK_TO_TAG: ${{ github.event.inputs.rollback_to_tag }}
      TARGET_ENV: ${{ github.event.inputs.target_environment || 'staging-rc' }}
      ROLLBACK_REASON: ${{ github.event.inputs.rollback_reason || 'release-readiness' }}
      OWNER_TAG: "07_REPO_ARCH/Infra"
    steps:
      - name: Capture rollback start UTC
        run: echo "ROLLBACK_START_UTC=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate rollback tags
        run: |
          [[ "${DEPLOYED_TAG}" =~ ^rc-[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[0-9]{2}$ ]] || {
            echo "Invalid deployed tag: ${DEPLOYED_TAG}"
            exit 1
          }
          [[ "${ROLLBACK_TO_TAG}" =~ ^rc-[0-9]{4}\.[0-9]{2}\.[0-9]{2}-[0-9]{2}$ ]] || {
            echo "Invalid rollback target tag: ${ROLLBACK_TO_TAG}"
            exit 1
          }
          git rev-parse "${DEPLOYED_TAG}^{tag}" >/dev/null 2>&1 || {
            echo "Missing deployed tag in repo: ${DEPLOYED_TAG}"
            exit 1
          }
          git rev-parse "${ROLLBACK_TO_TAG}^{tag}" >/dev/null 2>&1 || {
            echo "Missing rollback target tag in repo: ${ROLLBACK_TO_TAG}"
            exit 1
          }
          [[ "${DEPLOYED_TAG}" != "${ROLLBACK_TO_TAG}" ]] || {
            echo "Rollback target must differ from deployed tag"
            exit 1
          }

      - name: Resolve tag commits
        run: |
          echo "DEPLOYED_COMMIT=$(git rev-list -n 1 "${DEPLOYED_TAG}")" >> "$GITHUB_ENV"
          echo "ROLLBACK_COMMIT=$(git rev-list -n 1 "${ROLLBACK_TO_TAG}")" >> "$GITHUB_ENV"

      - name: Execute rollback quick-pass
        run: |
          echo "rollback_status=PASS"
          echo "rollback_target=${ROLLBACK_TO_TAG}"
          echo "rollback_reason=${ROLLBACK_REASON}"
          echo "target_environment=${TARGET_ENV}"
          echo "owner_tag=${OWNER_TAG}"

      - name: Emit rollback alert payload on failure
        if: failure()
        run: |
          echo "alert_rule=release-operations-guard-v1"
          echo "owner-tag=${OWNER_TAG}"
          echo "failure_hop=rollback"
          echo "first_failing_substep=rollback_quick_pass"
          echo "reason=${ROLLBACK_REASON}"

      - name: Capture rollback end UTC and emit evidence
        if: always()
        run: |
          ROLLBACK_END_UTC="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          cat > rollback-evidence.txt <<EOF
          deployed_tag=${DEPLOYED_TAG}
          deployed_commit=${DEPLOYED_COMMIT}
          rollback_to_tag=${ROLLBACK_TO_TAG}
          rollback_commit=${ROLLBACK_COMMIT}
          target_environment=${TARGET_ENV}
          rollback_reason=${ROLLBACK_REASON}
          owner_tag=${OWNER_TAG}
          rollback_start_utc=${ROLLBACK_START_UTC}
          rollback_end_utc=${ROLLBACK_END_UTC}
          workflow_run_url=https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          cat rollback-evidence.txt

      - name: Upload rollback evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rollback-evidence-${{ env.DEPLOYED_TAG }}-to-${{ env.ROLLBACK_TO_TAG }}
          path: rollback-evidence.txt
