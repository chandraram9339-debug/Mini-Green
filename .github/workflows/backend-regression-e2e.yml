name: backend-regression-e2e

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: backend-regression-e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regression-smoke-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      OWNER_TAG: "07_REPO_ARCH/Infra"
      RUN_CONTEXT: "regression-smoke-pr"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: pnpm --dir backend install --no-frozen-lockfile

      - name: Run regression smoke
        env:
          EXECUTION_MODE: mock
          OWNER_TAG: ${{ env.OWNER_TAG }}
          RUN_CONTEXT: ${{ env.RUN_CONTEXT }}
        run: scripts/regression-e2e-auth-ui.sh

      - name: Emit failure mode metadata
        if: failure()
        run: |
          echo "owner-tag=${OWNER_TAG}"
          echo "first_failing_substep=regression_smoke_pr"
          echo "failure_hop=e2e_runtime"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-regression-smoke-report-${{ github.run_id }}
          path: |
            backend/reports/regression-e2e-auth-ui.json
            backend/reports/ci-logs/regression-smoke-pr.log

  regression-full-main:
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      OWNER_TAG: "07_REPO_ARCH/Infra"
      RUN_CONTEXT: "regression-full-main"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install backend dependencies
        run: pnpm --dir backend install --no-frozen-lockfile

      - name: Run full regression
        env:
          EXECUTION_MODE: mock
          OWNER_TAG: ${{ env.OWNER_TAG }}
          RUN_CONTEXT: ${{ env.RUN_CONTEXT }}
        run: scripts/regression-e2e-auth-ui.sh

      - name: Emit failure mode metadata
        if: failure()
        run: |
          echo "owner-tag=${OWNER_TAG}"
          echo "first_failing_substep=regression_full_main"
          echo "failure_hop=e2e_runtime"

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-regression-full-report-${{ github.run_id }}
          path: |
            backend/reports/regression-e2e-auth-ui.json
            backend/reports/ci-logs/regression-full-main.log
